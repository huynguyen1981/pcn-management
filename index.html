<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PCN Control Center V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-[98%] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-indigo-600">
                <h1 class="text-xl font-black text-slate-800 uppercase italic">PCN Control Center V2</h1>
                <p class="text-xs text-slate-400 mt-2">Professional Engineering Management</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-center h-40">
                <canvas id="statusChart"></canvas>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col justify-center">
                <button onclick="exportPDF()" class="bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95">
                    📄 EXPORT UNREPORTED ONLY (A3)
                </button>
                <p class="text-[10px] text-center mt-2 text-slate-400 italic">*Chỉ xuất những mục chưa đánh dấu "Reported"*</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-200">
            <input type="hidden" id="editId">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <input type="text" id="pcnInput" placeholder="PCN #" class="border p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-300">
                <select id="pcnTypeInput" class="border p-2 rounded-lg text-sm font-bold">
                    <option value="MANDATORY">MANDATORY</option>
                    <option value="IMMEDIATELY">IMMEDIATELY</option>
                </select>
                <select id="statusInput" class="border p-2 rounded-lg text-sm font-bold">
                    <option value="IN-PROGRESS">IN-PROGRESS</option>
                    <option value="OUT FOR APPROVAL">OUT FOR APPROVAL</option>
                    <option value="RELEASED">RELEASED</option>
                </select>
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border">
                    <input type="checkbox" id="reportedInput" class="w-4 h-4">
                    <label class="text-xs font-bold text-slate-600">Mark as Reported</label>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <input type="text" id="engrTechInput" placeholder="Engr. Tech" class="border p-2 rounded-lg text-sm">
                <input type="text" id="apprEngrInput" placeholder="Appr Engr." class="border p-2 rounded-lg text-sm">
                <input type="text" id="attachInput" placeholder="📎 Attachment Link (Google Drive...)" class="border p-2 rounded-lg text-sm border-blue-200">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <input type="date" id="startInput" class="border p-2 rounded-lg text-sm" title="Start Date">
                <input type="date" id="apprDateInput" class="border p-2 rounded-lg text-sm" title="Appr Date">
                <input type="date" id="releaseDateInput" class="border p-2 rounded-lg text-sm" title="Rel Date">
                <button id="btnSubmit" onclick="saveTask()" class="bg-indigo-600 text-white font-black rounded-lg hover:bg-indigo-700 uppercase tracking-widest transition-all">Save PCN</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <textarea id="descInput" placeholder="Description..." class="border p-2 rounded-lg text-sm h-20"></textarea>
                <textarea id="remarksInput" placeholder="Remarks / Issues phát sinh..." class="border p-2 rounded-lg text-sm h-20 border-rose-100 bg-rose-50/30"></textarea>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-x-auto border border-slate-200">
            <div class="p-4 border-b">
                <input type="text" id="searchInput" onkeyup="renderTable(allTasks)" placeholder="🔍 Quick Search PCN/Description..." class="w-full p-2 border rounded-xl text-sm outline-none">
            </div>
            <table class="w-full text-[11px] text-left border-collapse min-w-[1600px]">
                <thead class="bg-slate-900 text-white uppercase italic font-light">
                    <tr>
                        <th class="p-3">PCN / Type</th>
                        <th class="p-3 text-center">Status</th>
                        <th class="p-3">Description / Remarks</th>
                        <th class="p-3 text-center">Dates (S/A/R)</th>
                        <th class="p-3 text-center">Tech / Appr</th>
                        <th class="p-3 text-center">Attach</th>
                        <th class="p-3 text-center">Reported</th>
                        <th class="p-3 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody" class="text-slate-600"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMCCijp590EbD09MWJXyFv7lpiSup6IJ96OmhGUj8tSZRtYQWSjaGcybWzVLPR41k3iQ/exec";
        let allTasks = [];
        let myChart = null;

        async function loadTasks() {
            const res = await fetch(SCRIPT_URL);
            allTasks = await res.json();
            renderTable(allTasks);
            updateChart();
        }

        function renderTable(data) {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const body = document.getElementById('taskTableBody');
            
            const filtered = data.filter(t => t[1].toLowerCase().includes(query) || t[4].toLowerCase().includes(query));

            body.innerHTML = filtered.map((row) => `
                <tr class="border-b hover:bg-slate-50 transition ${row[11] === true ? 'bg-slate-100/50' : ''}">
                    <td class="p-3 font-bold text-slate-900">${row[1]}<br><span class="text-[9px] text-slate-400">${row[2]}</span></td>
                    <td class="p-3 text-center"><span class="px-2 py-1 rounded text-[9px] font-black border ${getStatusClass(row[3])}">${row[3]}</span></td>
                    <td class="p-3 max-w-sm">
                        <div class="font-medium">${row[4]}</div>
                        <div class="text-[10px] text-rose-500 mt-1 italic">${row[12] ? '⚠️ ' + row[12] : ''}</div>
                    </td>
                    <td class="p-3 text-center leading-tight">S: ${formatDate(row[5])}<br>A: ${formatDate(row[7])}<br>R: ${formatDate(row[9])}</td>
                    <td class="p-3 text-center font-medium">${row[6]}<br><span class="text-[10px] text-slate-400">${row[8]}</span></td>
                    <td class="p-3 text-center italic">${row[10] ? `<a href="${row[10]}" target="_blank" class="text-blue-500 underline">Link</a>` : '-'}</td>
                    <td class="p-3 text-center">${row[11] ? '✅' : '❌'}</td>
                    <td class="p-3 text-center"><button onclick="prepareEdit('${row[0]}')" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg font-bold text-[10px]">EDIT</button></td>
                </tr>
            `).join('');
        }

        function getStatusClass(s) {
            if (s === 'RELEASED') return 'bg-green-50 text-green-600 border-green-200';
            if (s === 'OUT FOR APPROVAL') return 'bg-purple-50 text-purple-600 border-purple-200';
            return 'bg-amber-50 text-amber-600 border-amber-200';
        }

        function formatDate(d) { return d ? d.split('T')[0] : '-'; }

        function updateChart() {
            const stats = { 'RELEASED': 0, 'IN-PROGRESS': 0, 'OUT FOR APPROVAL': 0 };
            allTasks.forEach(t => { if(stats[t[3]] !== undefined) stats[t[3]]++; });

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('statusChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(stats),
                    datasets: [{
                        data: Object.values(stats),
                        backgroundColor: ['#10b981', '#f59e0b', '#8b5cf6'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'right', labels: { font: { size: 10 } } } } }
            });
        }

        async function saveTask() {
            const data = {
                id: document.getElementById('editId').value || null,
                pcn: document.getElementById('pcnInput').value,
                pcnType: document.getElementById('pcnTypeInput').value,
                status: document.getElementById('statusInput').value,
                desc: document.getElementById('descInput').value,
                start: document.getElementById('startInput').value,
                engrTech: document.getElementById('engrTechInput').value,
                apprDate: document.getElementById('apprDateInput').value,
                apprEngr: document.getElementById('apprEngrInput').value,
                releaseDate: document.getElementById('releaseDateInput').value,
                attach: document.getElementById('attachInput').value,
                isReported: document.getElementById('reportedInput').checked,
                remarks: document.getElementById('remarksInput').value
            };
            if (!data.pcn) return alert("Nhập PCN bồ ơi!");
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
            location.reload();
        }

        function prepareEdit(id) {
            const t = allTasks.find(x => x[0] == id);
            document.getElementById('editId').value = t[0];
            document.getElementById('pcnInput').value = t[1];
            document.getElementById('pcnTypeInput').value = t[2];
            document.getElementById('statusInput').value = t[3];
            document.getElementById('descInput').value = t[4];
            document.getElementById('startInput').value = formatDate(t[5]);
            document.getElementById('engrTechInput').value = t[6];
            document.getElementById('apprDateInput').value = formatDate(t[7]);
            document.getElementById('apprEngrInput').value = t[8];
            document.getElementById('releaseDateInput').value = formatDate(t[9]);
            document.getElementById('attachInput').value = t[10];
            document.getElementById('reportedInput').checked = t[11];
            document.getElementById('remarksInput').value = t[12];
            document.getElementById('btnSubmit').innerText = "Update PCN";
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a3');
            const toExport = allTasks.filter(t => !t[11]); // Lọc chỉ lấy IS_REPORTED = false
            const tableData = toExport.map(t => [t[1], t[2], t[3], t[4] + (t[12] ? '\nRemark: '+t[12] : ''), formatDate(t[5]), t[6], formatDate(t[9])]);
            doc.text("NEW PCN REPORT (UNREPORTED ONLY)", 14, 15);
            doc.autoTable({
                head: [['PCN', 'TYPE', 'STATUS', 'DESCRIPTION & REMARKS', 'START', 'TECH', 'REL DATE']],
                body: tableData,
                startY: 25,
                styles: { fontSize: 8 },
                headStyles: { fillColor: [15, 23, 42] }
            });
            doc.save("PCN-Unreported-Only.pdf");
        }

        loadTasks();
    </script>
</body>
</html>
