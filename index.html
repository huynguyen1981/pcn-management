<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Enterprise PCN System - Final Platinum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        th.sortable { cursor: pointer; position: relative; transition: all 0.2s; }
        th.sortable:hover { background-color: #1e293b; color: #60a5fa; }
        th.sortable::after { content: ' ↕'; font-size: 0.8em; opacity: 0.3; }
        textarea { resize: vertical; min-height: 80px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div class="max-w-[98%] mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b-2 border-slate-200 pb-4">
            <h1 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">🛡️ PCN Enterprise Control</h1>
            <div class="flex gap-3 w-full md:w-auto">
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 Search PCN or Description..." class="border-2 border-slate-200 p-2 rounded-xl text-sm w-full md:w-96 shadow-sm focus:border-indigo-500 outline-none transition-all">
                <button onclick="exportPDF()" class="bg-rose-600 hover:bg-rose-700 text-white px-6 py-2 rounded-xl font-bold shadow-lg transition-all whitespace-nowrap active:scale-95">
                    📄 Export Full A3 Report
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-200 border-t-4 border-t-indigo-600">
            <input type="hidden" id="editId">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 mb-1 ml-1 uppercase">PCN Number</label>
                    <input type="text" id="pcnInput" placeholder="Ex: PCN-2024-001" class="border p-2 rounded-lg text-sm focus:ring-2 focus:ring-indigo-200 outline-none">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 mb-1 ml-1 uppercase">PCN Type</label>
                    <select id="pcnTypeInput" class="border p-2 rounded-lg text-sm font-bold uppercase">
                        <option value="MANDATORY">MANDATORY</option>
                        <option value="IMMEDIATELY">IMMEDIATELY</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 mb-1 ml-1 uppercase">Current Status</label>
                    <select id="statusInput" class="border p-2 rounded-lg text-sm font-bold bg-slate-50">
                        <option value="IN-PROGRESS">IN-PROGRESS</option>
                        <option value="OUT FOR APPROVAL">OUT FOR APPROVAL</option>
                        <option value="RELEASED">RELEASED</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-400 mb-1 ml-1 uppercase">Engr. Tech</label>
                    <input type="text" id="engrTechInput" placeholder="Name..." class="border p-2 rounded-lg text-sm">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div class="flex flex-col">
                    <label class="text-[10px] text-slate-400 ml-1 font-bold uppercase">Start Date</label>
                    <input type="date" id="startInput" class="border p-2 rounded-lg text-sm">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] text-slate-400 ml-1 font-bold uppercase">Appr. Engr</label>
                    <input type="text" id="apprEngrInput" placeholder="Approver..." class="border p-2 rounded-lg text-sm">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] text-slate-400 ml-1 font-bold uppercase">Appr. Date</label>
                    <input type="date" id="apprDateInput" class="border p-2 rounded-lg text-sm">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] text-slate-400 ml-1 font-bold uppercase">Release Date</label>
                    <input type="date" id="releaseDateInput" class="border p-2 rounded-lg text-sm">
                </div>
            </div>

            <div class="flex flex-col mb-4">
                <label class="text-[10px] font-bold text-slate-400 mb-1 ml-1 uppercase">Detailed Description</label>
                <textarea id="descInput" placeholder="Enter detailed PCN description here..." class="border p-3 rounded-lg text-sm focus:ring-2 focus:ring-indigo-200 outline-none w-full"></textarea>
            </div>

            <div class="flex justify-end">
                <button id="btnSubmit" onclick="saveTask()" class="bg-indigo-600 text-white font-black px-10 py-3 rounded-xl hover:bg-indigo-700 shadow-lg transition-all uppercase tracking-widest active:scale-95">
                    Save Changes
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-x-auto border border-slate-200">
            <table id="pcnTable" class="w-full text-left border-collapse min-w-[1500px]">
                <thead class="bg-slate-800 text-white text-[11px] uppercase tracking-wider">
                    <tr>
                        <th class="p-4 sortable" onclick="sortTable(1)">PCN #</th>
                        <th class="p-4 sortable" onclick="sortTable(2)">Type</th>
                        <th class="p-4 text-center sortable" onclick="sortTable(3)">Status</th>
                        <th class="p-4 w-1/4">Description</th>
                        <th class="p-4 text-center sortable" onclick="sortTable(5)">Start Date</th>
                        <th class="p-4">Engr Tech</th>
                        <th class="p-4 text-center sortable" onclick="sortTable(7)">Appr Date</th>
                        <th class="p-4">Appr Engr</th>
                        <th class="p-4 text-center sortable" onclick="sortTable(9)">Release Date</th>
                        <th class="p-4 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody" class="text-[12px] text-slate-600">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNdyx_kd5dE4nC6CMV8CdBKm__0_pGbGnjr2gytlJzTUsmZm65qGuzoNpFWzxZO99ZnQ/exec";
        let allTasks = [];
        let currentSortCol = -1;
        let sortAsc = true;

        async function loadTasks() {
            const res = await fetch(SCRIPT_URL);
            allTasks = await res.json();
            renderTable(allTasks);
        }

        function renderTable(data) {
            const body = document.getElementById('taskTableBody');
            body.innerHTML = data.map((row) => `
                <tr class="border-b hover:bg-indigo-50/50 transition-colors ${row[0] === 'temp-id' ? 'opacity-50 animate-pulse bg-blue-50' : ''}">
                    <td class="p-4 font-bold text-slate-900">${row[1]}</td>
                    <td class="p-4 text-[10px] font-bold text-slate-400 uppercase">${row[2]}</td>
                    <td class="p-4 text-center">
                        <span class="px-3 py-1.5 rounded-md text-[10px] font-black shadow-sm ${getStatusClass(row[3])}">${row[3]}</span>
                    </td>
                    <td class="p-4 text-slate-500 italic whitespace-pre-wrap leading-relaxed">${row[4]}</td>
                    <td class="p-4 text-center">${row[5] ? row[5].split('T')[0] : '-'}</td>
                    <td class="p-4 font-medium text-slate-700">${row[6]}</td>
                    <td class="p-4 text-center">${row[7] ? row[7].split('T')[0] : '-'}</td>
                    <td class="p-4">${row[8]}</td>
                    <td class="p-4 text-center font-bold text-slate-800">${row[9] ? row[9].split('T')[0] : '-'}</td>
                    <td class="p-4 text-center">
                        <button onclick="prepareEdit('${row[0]}')" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white px-4 py-1.5 rounded-lg font-bold transition-all border border-indigo-100">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            if (status === 'RELEASED') return 'bg-emerald-100 text-emerald-700 border border-emerald-200';
            if (status === 'OUT FOR APPROVAL') return 'bg-violet-100 text-violet-700 border border-violet-200';
            return 'bg-amber-100 text-amber-700 border border-amber-200';
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTasks.filter(t => 
                (t[1] && t[1].toLowerCase().includes(query)) || 
                (t[4] && t[4].toLowerCase().includes(query))
            );
            renderTable(filtered);
        }

        function sortTable(colIndex) {
            sortAsc = (currentSortCol === colIndex) ? !sortAsc : true;
            currentSortCol = colIndex;
            allTasks.sort((a, b) => {
                let valA = a[colIndex] ? a[colIndex].toString().toLowerCase() : "";
                let valB = b[colIndex] ? b[colIndex].toString().toLowerCase() : "";
                return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });
            renderTable(allTasks);
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a3'); 
            doc.setFontSize(20);
            doc.setTextColor(30, 41, 59);
            doc.text("MASTER PCN STATUS REPORT", 14, 20);
            
            const tableData = allTasks.map(t => [
                t[1], t[2], t[3], t[4], 
                t[5]?t[5].split('T')[0]:'', 
                t[6], 
                t[7]?t[7].split('T')[0]:'', 
                t[8], 
                t[9]?t[9].split('T')[0]:''
            ]);
            
            doc.autoTable({
                head: [['PCN #', 'TYPE', 'STATUS', 'DESCRIPTION', 'START', 'TECH', 'APPR DATE', 'APPR ENGR', 'REL DATE']],
                body: tableData,
                startY: 30,
                theme: 'grid',
                styles: { fontSize: 8, cellPadding: 3, overflow: 'linebreak' },
                headStyles: { fillColor: [30, 41, 59], textColor: 255, fontStyle: 'bold' },
                columnStyles: { 3: { cellWidth: 100 } }
            });
            doc.save(`PCN-Full-Report-${new Date().toLocaleDateString()}.pdf`);
        }

        async function saveTask() {
            const editId = document.getElementById('editId').value;
            const taskData = {
                id: editId || null,
                pcn: document.getElementById('pcnInput').value,
                pcnType: document.getElementById('pcnTypeInput').value,
                status: document.getElementById('statusInput').value,
                desc: document.getElementById('descInput').value,
                start: document.getElementById('startInput').value,
                engrTech: document.getElementById('engrTechInput').value,
                apprDate: document.getElementById('apprDateInput').value,
                apprEngr: document.getElementById('apprEngrInput').value,
                releaseDate: document.getElementById('releaseDateInput').value
            };
            
            if (!taskData.pcn) return alert("Bồ quên nhập PCN Number rồi!");

            // Optimistic UI
            const tempRow = ['temp-id', taskData.pcn, taskData.pcnType, taskData.status, taskData.desc, taskData.start, taskData.engrTech, taskData.apprDate, taskData.apprEngr, taskData.releaseDate];
            if (!editId) {
                renderTable([tempRow, ...allTasks]);
            } else {
                const idx = allTasks.findIndex(t => t[0] == editId);
                allTasks[idx] = tempRow;
                renderTable(allTasks);
            }

            try {
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(taskData) });
                // Reset form
                document.getElementById('editId').value = "";
                document.getElementById('btnSubmit').innerText = "Save Changes";
                document.getElementById('pcnInput').value = "";
                document.getElementById('descInput').value = "";
                loadTasks();
            } catch (e) {
                alert("Lỗi lưu rồi bồ ơi!");
                loadTasks();
            }
        }

        function prepareEdit(id) {
            const task = allTasks.find(t => t[0] == id);
            document.getElementById('editId').value = task[0];
            document.getElementById('pcnInput').value = task[1];
            document.getElementById('pcnTypeInput').value = task[2];
            document.getElementById('statusInput').value = task[3];
            document.getElementById('descInput').value = task[4];
            document.getElementById('startInput').value = task[5] ? task[5].split('T')[0] : '';
            document.getElementById('engrTechInput').value = task[6];
            document.getElementById('apprDateInput').value = task[7] ? task[7].split('T')[0] : '';
            document.getElementById('apprEngrInput').value = task[8];
            document.getElementById('releaseDateInput').value = task[9] ? task[9].split('T')[0] : '';
            document.getElementById('btnSubmit').innerText = "Update PCN";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        loadTasks();
    </script>
</body>
</html>
