<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">📊 Task Report System</h1>
            <button onclick="exportPDF()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-bold shadow">
                📄 Export PDF Report
            </button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-slate-200">
            <input type="hidden" id="editId">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="taskInput" placeholder="Task name..." class="border p-2 rounded-md outline-blue-500">
                <select id="pcnInput" class="border p-2 rounded-md text-sm">
                    <option value="Mandatory">Mandatory</option>
                    <option value="Immediately">Immediately</option>
                    <option value="Schedule">Schedule</option>
                </select>
                <select id="statusInput" class="border p-2 rounded-md text-sm font-bold">
                    <option value="IN PROGRESS">IN PROGRESS</option>
                    <option value="ON HOLD">ON HOLD</option>
                    <option value="RELEASE">RELEASE</option>
                </select>
                <input type="date" id="startInput" class="border p-2 rounded-md">
                <input type="date" id="endInput" class="border p-2 rounded-md">
                <button id="btnSubmit" onclick="saveTask()" class="bg-indigo-600 text-white font-bold py-2 rounded-md hover:bg-indigo-700 transition">Save Task</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table id="taskTable" class="w-full text-left border-collapse">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="p-4">Task</th>
                        <th class="p-4 text-center">PCN</th>
                        <th class="p-4 text-center">Status</th>
                        <th class="p-4 text-center">Dates</th>
                        <th class="p-4 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhe09ADEYM0lDZurvMrhmXV32Zvwn4d9I6M8d9hZRyVMYZhI32x5oJv4yKzItOl4IHNQ/exec";
        let allTasks = [];

        async function loadTasks() {
            const res = await fetch(SCRIPT_URL);
            allTasks = await res.json();
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('taskTableBody');
            body.innerHTML = allTasks.map((row, index) => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-4 font-medium">${row[1]}</td>
                    <td class="p-4 text-center text-xs font-bold uppercase text-slate-500">${row[2]}</td>
                    <td class="p-4 text-center">
                        <span class="px-2 py-1 rounded text-[10px] font-bold ${row[3] === 'RELEASE' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${row[3]}</span>
                    </td>
                    <td class="p-4 text-center text-xs text-slate-400">
                        ${row[4].split('T')[0]} ➡️ ${row[5].split('T')[0]}
                    </td>
                    <td class="p-4 text-center">
                        <button onclick='editTask(${JSON.stringify(index)})' class="text-blue-600 hover:underline font-bold">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        function editTask(index) {
            const task = allTasks[index];
            document.getElementById('editId').value = task[0];
            document.getElementById('taskInput').value = task[1];
            document.getElementById('pcnInput').value = task[2];
            document.getElementById('statusInput').value = task[3];
            document.getElementById('startInput').value = task[4].split('T')[0];
            document.getElementById('endInput').value = task[5].split('T')[0];
            document.getElementById('btnSubmit').innerText = "Update Now";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveTask() {
            const data = {
                id: document.getElementById('editId').value || null,
                task: document.getElementById('taskInput').value,
                pcn: document.getElementById('pcnInput').value,
                status: document.getElementById('statusInput').value,
                start: document.getElementById('startInput').value,
                end: document.getElementById('endInput').value
            };

            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
            
            // Reset
            document.getElementById('editId').value = "";
            document.getElementById('btnSubmit').innerText = "Save Task";
            loadTasks();
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("TASK MANAGEMENT REPORT", 14, 15);
            
            const tableData = allTasks.map(t => [t[1], t[2], t[3], t[4].split('T')[0], t[5].split('T')[0]]);
            
            doc.autoTable({
                head: [['Task', 'PCN', 'Status', 'Start', 'End']],
                body: tableData,
                startY: 25,
                theme: 'striped'
            });
            doc.save("Task-Report.pdf");
        }

        loadTasks();
    </script>
</body>
</html>
