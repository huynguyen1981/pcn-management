<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ultimate PCN Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        th.sortable { cursor: pointer; position: relative; }
        th.sortable:hover { background-color: #1e293b; }
        th.sortable::after { content: ' ↕'; font-size: 0.8em; opacity: 0.5; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4">
    <div class="max-w-[98%] mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b pb-4">
            <h1 class="text-2xl font-black text-slate-900 uppercase">🛡️ PCN Enterprise Control</h1>
            <div class="flex gap-3 w-full md:w-auto">
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 Search PCN or Description..." class="border p-2 rounded-xl text-sm w-full md:w-80 shadow-sm focus:ring-2 focus:ring-indigo-400 outline-none">
                <button onclick="exportPDF()" class="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2 rounded-xl font-bold shadow-lg transition-all whitespace-nowrap">
                    📄 Full Report (PDF)
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-200">
            <input type="hidden" id="editId">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" id="pcnInput" placeholder="PCN #" class="border p-2 rounded-lg text-sm">
                <select id="pcnTypeInput" class="border p-2 rounded-lg text-sm">
                    <option value="Mandatory">Mandatory</option>
                    <option value="Immediately">Immediately</option>
                    <option value="Schedule">Schedule</option>
                </select>
                <select id="statusInput" class="border p-2 rounded-lg text-sm font-bold bg-slate-50">
                    <option value="IN-PROGRESS">IN-PROGRESS</option>
                    <option value="OUT FOR APPROVAL">OUT FOR APPROVAL</option>
                    <option value="RELEASED">RELEASED</option>
                </select>
                <input type="text" id="engrTechInput" placeholder="Engr. Tech" class="border p-2 rounded-lg text-sm">
                <input type="text" id="apprEngrInput" placeholder="Appr Engr." class="border p-2 rounded-lg text-sm">
                
                <div class="flex flex-col"><label class="text-[10px] text-slate-400 ml-1">Start Date</label><input type="date" id="startInput" class="border p-2 rounded-lg text-sm"></div>
                <div class="flex flex-col"><label class="text-[10px] text-slate-400 ml-1">Appr Date</label><input type="date" id="apprDateInput" class="border p-2 rounded-lg text-sm"></div>
                <div class="flex flex-col"><label class="text-[10px] text-slate-400 ml-1">Release Date</label><input type="date" id="releaseDateInput" class="border p-2 rounded-lg text-sm"></div>
                
                <textarea id="descInput" placeholder="Description..." class="border p-2 rounded-lg text-sm md:col-span-1 h-[42px]"></textarea>
                <button id="btnSubmit" onclick="saveTask()" class="bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 shadow-md h-[42px] self-end">Save Change</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-x-auto border border-slate-200">
            <table id="pcnTable" class="w-full text-left border-collapse min-w-[1400px]">
                <thead class="bg-slate-800 text-white text-[11px] uppercase tracking-wider">
                    <tr>
                        <th class="p-3 sortable" onclick="sortTable(1)">PCN #</th>
                        <th class="p-3 sortable" onclick="sortTable(2)">Type</th>
                        <th class="p-3 text-center sortable" onclick="sortTable(3)">Status</th>
                        <th class="p-3">Description</th>
                        <th class="p-3 sortable" onclick="sortTable(5)">Start Date</th>
                        <th class="p-3">Engr Tech</th>
                        <th class="p-3 sortable" onclick="sortTable(7)">Appr Date</th>
                        <th class="p-3">Appr Engr</th>
                        <th class="p-3 sortable" onclick="sortTable(9)">Release Date</th>
                        <th class="p-3 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody" class="text-[12px] text-slate-600"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNdyx_kd5dE4nC6CMV8CdBKm__0_pGbGnjr2gytlJzTUsmZm65qGuzoNpFWzxZO99ZnQ/exec";
        let allTasks = [];
        let currentSortCol = -1;
        let sortAsc = true;

        async function loadTasks() {
            const res = await fetch(SCRIPT_URL);
            allTasks = await res.json();
            renderTable(allTasks);
        }

        function renderTable(data) {
            const body = document.getElementById('taskTableBody');
            body.innerHTML = data.map((row) => `
                <tr class="border-b hover:bg-indigo-50/30 transition ${row[0] === 'temp-id' ? 'opacity-50 animate-pulse bg-blue-50' : ''}">
                    <td class="p-3 font-bold text-slate-900">${row[1]}</td>
                    <td class="p-3 italic">${row[2]}</td>
                    <td class="p-3 text-center">
                        <span class="px-2 py-1 rounded text-[10px] font-black ${getStatusClass(row[3])}">${row[3]}</span>
                    </td>
                    <td class="p-3 max-w-xs truncate" title="${row[4]}">${row[4]}</td>
                    <td class="p-3 text-center">${row[5] ? row[5].split('T')[0] : '-'}</td>
                    <td class="p-3 font-medium">${row[6]}</td>
                    <td class="p-3 text-center">${row[7] ? row[7].split('T')[0] : '-'}</td>
                    <td class="p-3">${row[8]}</td>
                    <td class="p-3 text-center font-bold text-slate-800">${row[9] ? row[9].split('T')[0] : '-'}</td>
                    <td class="p-3 text-center">
                        <button onclick="prepareEdit('${row[0]}')" class="bg-slate-100 hover:bg-indigo-600 hover:text-white px-3 py-1 rounded transition-all">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            if (status === 'RELEASED') return 'bg-green-100 text-green-700 border border-green-200';
            if (status === 'OUT FOR APPROVAL') return 'bg-purple-100 text-purple-700 border border-purple-200';
            return 'bg-amber-100 text-amber-700 border border-amber-200';
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTasks.filter(t => t[1].toLowerCase().includes(query) || t[4].toLowerCase().includes(query));
            renderTable(filtered);
        }

        function sortTable(colIndex) {
            sortAsc = (currentSortCol === colIndex) ? !sortAsc : true;
            currentSortCol = colIndex;
            allTasks.sort((a, b) => {
                let valA = a[colIndex] ? a[colIndex].toString().toLowerCase() : "";
                let valB = b[colIndex] ? b[colIndex].toString().toLowerCase() : "";
                return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });
            renderTable(allTasks);
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a3'); // Dùng khổ A3 ngang cho cực rộng
            doc.setFontSize(18);
            doc.text("MASTER PCN STATUS REPORT", 14, 20);
            
            const tableData = allTasks.map(t => [t[1], t[2], t[3], t[4], t[5]?t[5].split('T')[0]:'', t[6], t[7]?t[7].split('T')[0]:'', t[8], t[9]?t[9].split('T')[0]:'']);
            
            doc.autoTable({
                head: [['PCN #', 'Type', 'Status', 'Description', 'Start', 'Tech', 'Appr Date', 'Appr Engr', 'Rel Date']],
                body: tableData,
                startY: 30,
                theme: 'grid',
                styles: { fontSize: 8, cellPadding: 2 },
                headStyles: { fillColor: [15, 23, 42], textColor: 255, fontStyle: 'bold' },
                columnStyles: { 3: { cellWidth: 80 } } // Cho cột Desc rộng ra
            });
            doc.save("PCN-Full-Report.pdf");
        }

        async function saveTask() {
            const editId = document.getElementById('editId').value;
            const taskData = {
                id: editId || null,
                pcn: document.getElementById('pcnInput').value,
                pcnType: document.getElementById('pcnTypeInput').value,
                status: document.getElementById('statusInput').value,
                desc: document.getElementById('descInput').value,
                start: document.getElementById('startInput').value,
                engrTech: document.getElementById('engrTechInput').value,
                apprDate: document.getElementById('apprDateInput').value,
                apprEngr: document.getElementById('apprEngrInput').value,
                releaseDate: document.getElementById('releaseDateInput').value
            };
            
            // Optimistic UI logic... (như bản trước)
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(taskData) });
            // Reset & Reload...
            location.reload(); 
        }

        function prepareEdit(id) {
            const task = allTasks.find(t => t[0] == id);
            document.getElementById('editId').value = task[0];
            document.getElementById('pcnInput').value = task[1];
            document.getElementById('pcnTypeInput').value = task[2];
            document.getElementById('statusInput').value = task[3];
            document.getElementById('descInput').value = task[4];
            document.getElementById('startInput').value = task[5] ? task[5].split('T')[0] : '';
            document.getElementById('engrTechInput').value = task[6];
            document.getElementById('apprDateInput').value = task[7] ? task[7].split('T')[0] : '';
            document.getElementById('apprEngrInput').value = task[8];
            document.getElementById('releaseDateInput').value = task[9] ? task[9].split('T')[0] : '';
            document.getElementById('btnSubmit').innerText = "Update Now";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        loadTasks();
    </script>
</body>
</html>
