<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PCN Control - Monday Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .monday-card { border-radius: 8px; border: 1px solid #e6e9ef; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .status-pill { border-radius: 4px; font-size: 10px; font-weight: 700; padding: 4px 6px; text-transform: uppercase; white-space: nowrap; }
        .updating { pointer-events: none; opacity: 0.4; background-color: #f1f5f9 !important; }
        .table-header { font-size: 10px; color: #676879; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        /* Cố định không cho cuộn ngang nhưng vẫn đảm bảo chữ không bị đè */
        table { table-layout: fixed; width: 100%; }
        td { word-wrap: break-word; vertical-align: top; }
    </style>
</head>
<body class="bg-[#f5f6f8] min-h-screen p-4 md:p-6">

    <div class="max-w-[1600px] mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-extrabold text-[#333]">PCN Master Board</h1>
                <p class="text-[#676879] text-xs mt-1 font-medium">Full detail view with integrated remarks</p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportPDF()" class="bg-white border border-[#c3c6d4] text-[#333] px-4 py-2 rounded font-bold text-xs shadow-sm hover:bg-slate-50 transition-all">📄 Export A3</button>
                <button onclick="toggleModal(true)" class="bg-[#0073ea] text-white px-6 py-2 rounded font-bold text-xs shadow-md hover:bg-[#0060c1] transition-all">+ New PCN</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-6">
            <div class="lg:col-span-3 bg-white p-4 monday-card flex items-center justify-center h-48">
                <canvas id="statusChart"></canvas>
            </div>
            <div class="bg-white p-5 monday-card flex flex-col justify-center">
                <span class="text-[10px] font-bold text-[#676879] uppercase mb-2">Quick Search</span>
                <input type="text" id="searchInput" onkeyup="renderTable(allTasks)" placeholder="Search PCN, Tech..." class="w-full border border-[#c3c6d4] p-2 rounded text-sm outline-none focus:border-[#0073ea] bg-[#f5f6f8]">
            </div>
        </div>

        <div class="bg-white monday-card overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-[#f5f6f8] border-b table-header">
                    <tr>
                        <th class="p-3 w-[100px] cursor-pointer" onclick="sortTable(1)">PCN # ↕</th>
                        <th class="p-3 w-[120px] text-center" onclick="sortTable(3)">Status ↕</th>
                        <th class="p-3">Description & Remarks</th>
                        <th class="p-3 w-[100px] text-center">Start</th>
                        <th class="p-3 w-[100px] text-center">Appr Date</th>
                        <th class="p-3 w-[100px] text-center font-bold text-[#333]">Release</th>
                        <th class="p-3 w-[110px]">Engr Tech</th>
                        <th class="p-3 w-[110px]">Appr Engr</th>
                        <th class="p-3 w-[50px] text-center">Att</th>
                        <th class="p-3 w-[70px] text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody" class="text-[12px] text-[#333]"></tbody>
            </table>
        </div>
    </div>

    <div id="pcnModal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="absolute inset-0 bg-[#333333aa]"></div>
        <div class="bg-white w-full max-w-4xl mx-auto rounded-lg shadow-2xl z-50 overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h2 id="modalTitle" class="text-lg font-bold text-[#333]">Add PCN Detail</h2>
                <button onclick="toggleModal(false)" class="text-2xl text-[#676879]">&times;</button>
            </div>
            <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 max-h-[75vh] overflow-y-auto">
                <div class="space-y-4">
                    <input type="hidden" id="editId">
                    <div>
                        <label class="block text-[10px] font-bold text-[#676879] uppercase mb-1">PCN Number & Type</label>
                        <div class="flex gap-2">
                            <input type="text" id="pcnInput" class="flex-1 border p-2 rounded outline-none focus:border-[#0073ea]" placeholder="PCN-XXXX">
                            <select id="pcnTypeInput" class="border p-2 rounded outline-none font-bold">
                                <option value="MANDATORY">MANDATORY</option>
                                <option value="IMMEDIATELY">IMMEDIATELY</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-[#676879] uppercase mb-1">Status</label>
                        <select id="statusInput" class="w-full border p-2 rounded outline-none font-bold text-[#0073ea]">
                            <option value="IN-PROGRESS">IN-PROGRESS</option>
                            <option value="ENG REVIEW">ENG REVIEW</option>
                            <option value="OUT FOR APPROVAL">OUT FOR APPROVAL</option>
                            <option value="RELEASED">RELEASED</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-[#676879] uppercase mb-1">Engr. Tech</label>
                            <input type="text" id="engrTechInput" class="w-full border p-2 rounded text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-[#676879] uppercase mb-1">Appr. Engr</label>
                            <input type="text" id="apprEngrInput" class="w-full border p-2 rounded text-sm">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-[#676879] uppercase mb-1">Start</label>
                            <input type="date" id="startInput" class="w-full border p-2 rounded text-[10px]">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-[#676879] uppercase mb-1">Appr</label>
                            <input type="date" id="apprDateInput" class="w-full border p-2 rounded text-[10px]">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-[#333] uppercase mb-1">Release</label>
                            <input type="date" id="releaseDateInput" class="w-full border border-indigo-300 p-2 rounded text-[10px] font-bold">
                        </div>
                    </div>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-[#676879] uppercase mb-1">Description</label>
                        <textarea id="descInput" class="w-full border p-2 rounded h-24 text-sm outline-none focus:border-[#0073ea]"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-rose-500 uppercase mb-1">Remarks / Issues</label>
                        <textarea id="remarksInput" class="w-full border border-rose-100 bg-rose-50/20 p-2 rounded h-24 text-sm text-rose-700 italic outline-none"></textarea>
                    </div>
                </div>
            </div>
            <div class="p-6 border-t flex justify-between items-center bg-slate-50">
                <div class="flex items-center gap-4">
                    <input type="text" id="attachInput" placeholder="📎 Link Drive..." class="text-xs border-b border-slate-300 p-1 outline-none w-40 bg-transparent">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="reportedInput" class="accent-[#00c875] w-4 h-4">
                        <span class="text-[10px] font-bold text-[#676879]">REPORTED</span>
                    </label>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleModal(false)" class="px-4 py-2 text-xs font-bold text-[#676879]">Cancel</button>
                    <button id="btnSubmit" onclick="saveTask()" class="bg-[#0073ea] text-white px-8 py-2 rounded font-bold shadow-md text-xs hover:bg-[#0060c1]">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMCCijp590EbD09MWJXyFv7lpiSup6IJ96OmhGUj8tSZRtYQWSjaGcybWzVLPR41k3iQ/exec";
        let allTasks = [];
        let myChart = null;
        let currentSortCol = -1;
        let sortAsc = true;
        let updatingId = null;

        async function loadTasks() {
            const res = await fetch(SCRIPT_URL);
            allTasks = await res.json();
            renderTable(allTasks);
            updateChart();
            updatingId = null;
        }

        function toggleModal(show) {
            const modal = document.getElementById('pcnModal');
            if (show) modal.classList.remove('opacity-0', 'pointer-events-none');
            else { modal.classList.add('opacity-0', 'pointer-events-none'); resetForm(); }
        }

        function resetForm() {
            document.getElementById('editId').value = "";
            document.getElementById('pcnInput').value = "";
            document.getElementById('descInput').value = "";
            document.getElementById('remarksInput').value = "";
            document.getElementById('attachInput').value = "";
            document.getElementById('reportedInput').checked = false;
            document.getElementById('modalTitle').innerText = "Add PCN Detail";
            document.getElementById('btnSubmit').innerText = "Save Changes";
        }

        function renderTable(data) {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const body = document.getElementById('taskTableBody');
            const filtered = data.filter(t => t[1].toLowerCase().includes(query) || t[4].toLowerCase().includes(query) || t[6].toLowerCase().includes(query));

            body.innerHTML = filtered.map((row) => {
                const isUpdating = row[0] === updatingId;
                return `
                <tr class="border-b hover:bg-[#f8fafc] transition-colors ${row[11] ? 'bg-slate-50/50 grayscale-[0.2]' : ''} ${isUpdating ? 'updating' : ''}">
                    <td class="p-3 font-bold">${row[1]}<br><span class="text-[9px] text-slate-400 font-normal uppercase">${row[2]}</span></td>
                    <td class="p-3 text-center"><span class="status-pill ${getStatusClass(row[3])}">${row[3]}</span></td>
                    <td class="p-3">
                        <div class="font-medium text-slate-700 leading-snug line-clamp-2">${row[4]}</div>
                        ${row[12] ? `<div class="text-[10px] text-rose-500 font-bold italic mt-1 bg-rose-50/50 px-1 rounded">⚠️ ${row[12]}</div>` : ''}
                    </td>
                    <td class="p-3 text-center text-slate-500">${formatDate(row[5])}</td>
                    <td class="p-3 text-center text-slate-500">${formatDate(row[7])}</td>
                    <td class="p-3 text-center font-bold text-slate-900">${formatDate(row[9])}</td>
                    <td class="p-3 font-medium text-indigo-600">${row[6]}</td>
                    <td class="p-3 font-medium text-slate-600">${row[8]}</td>
                    <td class="p-3 text-center">${row[10] ? `<a href="${row[10]}" target="_blank">📎</a>` : '-'}</td>
                    <td class="p-3 text-center">
                        <button onclick="prepareEdit('${row[0]}')" ${isUpdating ? 'disabled' : ''} class="text-[#0073ea] font-bold hover:underline ${isUpdating ? 'opacity-20' : ''}">
                            ${isUpdating ? '...' : 'Edit'}
                        </button>
                    </td>
                </tr>
            `}).join('');
        }

        function getStatusClass(s) {
            if (s === 'RELEASED') return 'bg-[#00c875] text-white';
            if (s === 'OUT FOR APPROVAL') return 'bg-[#a25ddc] text-white';
            if (s === 'ENG REVIEW') return 'bg-[#579bfc] text-white';
            return 'bg-[#fdab3d] text-white';
        }

        function formatDate(d) { return d ? d.split('T')[0] : '-'; }

        function updateChart() {
            const stats = { 'RELEASED': 0, 'IN-PROGRESS': 0, 'OUT FOR APPROVAL': 0, 'ENG REVIEW': 0 };
            allTasks.forEach(t => { if(stats[t[3]] !== undefined) stats[t[3]]++; });
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('statusChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(stats),
                    datasets: [{
                        data: Object.values(stats),
                        backgroundColor: ['#00c875', '#fdab3d', '#a25ddc', '#579bfc'],
                        borderRadius: 4,
                        barThickness: 30
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { display: false }, ticks: { font: { size: 9 } } }, x: { grid: { display: false }, ticks: { font: { size: 9, weight: 'bold' } } } }
                }
            });
        }

        function sortTable(colIndex) {
            sortAsc = (currentSortCol === colIndex) ? !sortAsc : true;
            currentSortCol = colIndex;
            allTasks.sort((a, b) => {
                let valA = a[colIndex] ? a[colIndex].toString().toLowerCase() : "";
                let valB = b[colIndex] ? b[colIndex].toString().toLowerCase() : "";
                return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });
            renderTable(allTasks);
        }

        async function saveTask() {
            const id = document.getElementById('editId').value;
            const data = {
                id: id || null,
                pcn: document.getElementById('pcnInput').value,
                pcnType: document.getElementById('pcnTypeInput').value,
                status: document.getElementById('statusInput').value,
                desc: document.getElementById('descInput').value,
                start: document.getElementById('startInput').value,
                engrTech: document.getElementById('engrTechInput').value,
                apprDate: document.getElementById('apprDateInput').value,
                apprEngr: document.getElementById('apprEngrInput').value,
                releaseDate: document.getElementById('releaseDateInput').value,
                attach: document.getElementById('attachInput').value,
                isReported: document.getElementById('reportedInput').checked,
                remarks: document.getElementById('remarksInput').value
            };
            if (!data.pcn) return alert("Bồ chưa nhập PCN # kìa!");
            
            updatingId = id; 
            toggleModal(false);
            renderTable(allTasks);
            
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
            loadTasks();
        }

        function prepareEdit(id) {
            const t = allTasks.find(x => x[0] == id);
            document.getElementById('editId').value = t[0];
            document.getElementById('pcnInput').value = t[1];
            document.getElementById('pcnTypeInput').value = t[2];
            document.getElementById('statusInput').value = t[3];
            document.getElementById('descInput').value = t[4];
            document.getElementById('startInput').value = formatDate(t[5]);
            document.getElementById('engrTechInput').value = t[6];
            document.getElementById('apprDateInput').value = formatDate(t[7]);
            document.getElementById('apprEngrInput').value = t[8];
            document.getElementById('releaseDateInput').value = formatDate(t[9]);
            document.getElementById('attachInput').value = t[10];
            document.getElementById('reportedInput').checked = t[11];
            document.getElementById('remarksInput').value = t[12];
            document.getElementById('modalTitle').innerText = "Edit PCN Detail";
            document.getElementById('btnSubmit').innerText = "Update Now";
            toggleModal(true);
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a3');
            const toExport = allTasks.filter(t => !t[11]);
            const tableData = toExport.map(t => [
                t[1], t[2], t[3], 
                t[4] + (t[12] ? "\n---\nREMARK: " + t[12] : ""), 
                formatDate(t[5]), t[6], formatDate(t[7]), t[8], formatDate(t[9])
            ]);
            doc.text("PCN STATUS REPORT", 14, 20);
            doc.autoTable({
                head: [['PCN', 'TYPE', 'STATUS', 'CONTENT & REMARKS', 'START', 'TECH', 'APPR DATE', 'APPR', 'REL DATE']],
                body: tableData,
                startY: 30,
                styles: { fontSize: 9, cellPadding: 3 },
                headStyles: { fillColor: [0, 115, 234] }
            });
            doc.save("PCN-Full-Report.pdf");
        }

        loadTasks();
    </script>
</body>
</html>
