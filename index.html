<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PCN Control V3 - Modal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        th.sortable { cursor: pointer; position: relative; }
        th.sortable:hover { background-color: #1e293b; color: #60a5fa; }
        th.sortable::after { content: ' ↕'; font-size: 0.8em; opacity: 0.3; margin-left: 5px; }
        .table-text { font-size: 13px; }
        /* Hiệu ứng mượt cho Modal */
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow-x: hidden; overflow-y: hidden !important; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-full mx-auto">
        <div class="flex flex-col lg:flex-row gap-6 mb-8 items-stretch">
            <div class="lg:w-1/4 bg-slate-900 p-8 rounded-3xl shadow-2xl text-white flex flex-col justify-between">
                <div>
                    <h1 class="text-3xl font-black italic tracking-tighter text-indigo-400">PCN SYSTEM</h1>
                    <p class="text-slate-400 text-sm mt-2 font-medium uppercase tracking-widest">Enterprise Edition V3</p>
                </div>
                <div class="mt-8 flex flex-col gap-3">
                    <button onclick="toggleModal(true)" class="bg-indigo-500 hover:bg-indigo-400 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                        <span class="text-xl">+</span> ADD NEW PCN
                    </button>
                    <button onclick="exportPDF()" class="bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 rounded-2xl shadow-lg transition-all active:scale-95 text-sm uppercase tracking-wider">
                        📄 EXPORT PDF (UNREPORTED)
                    </button>
                </div>
            </div>
            
            <div class="lg:w-3/4 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center justify-center min-h-[300px]">
                <div class="w-full max-w-xl">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
            <div class="p-6 bg-slate-50 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-indigo-600 rounded-full animate-pulse"></div>
                    <h2 class="font-black text-slate-800 uppercase tracking-widest">Master Database</h2>
                </div>
                <input type="text" id="searchInput" onkeyup="renderTable(allTasks)" placeholder="🔍 Search PCN, Tech, or Description..." class="w-full md:w-1/2 p-4 rounded-2xl bg-white border-2 border-slate-100 text-slate-700 shadow-inner outline-none focus:border-indigo-400 transition-all text-sm">
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[2200px]">
                    <thead class="bg-slate-50 text-slate-400 text-[11px] font-black uppercase tracking-widest border-b">
                        <tr>
                            <th class="p-5 sortable" onclick="sortTable(1)">PCN #</th>
                            <th class="p-5 sortable" onclick="sortTable(2)">Type</th>
                            <th class="p-5 text-center sortable" onclick="sortTable(3)">Status</th>
                            <th class="p-5 w-[450px]">Description</th>
                            <th class="p-5 w-[300px]">Remarks/Issues</th>
                            <th class="p-5 text-center sortable" onclick="sortTable(5)">Start Date</th>
                            <th class="p-5 sortable" onclick="sortTable(6)">Engr Tech</th>
                            <th class="p-5 text-center sortable" onclick="sortTable(7)">Appr Date</th>
                            <th class="p-5 sortable" onclick="sortTable(8)">Appr Engr</th>
                            <th class="p-5 text-center sortable" onclick="sortTable(9)">Release Date</th>
                            <th class="p-5 text-center">Attach</th>
                            <th class="p-5 text-center sortable" onclick="sortTable(11)">Reported</th>
                            <th class="p-5 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody" class="table-text text-slate-700 font-medium"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="pcnModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-60"></div>
        
        <div class="modal-container bg-white w-11/12 md:max-w-4xl mx-auto rounded-3xl shadow-2xl z-50 overflow-y-auto max-h-[90vh]">
            <div class="p-8">
                <div class="flex justify-between items-center pb-6 border-b mb-6">
                    <p class="text-2xl font-black text-indigo-600 uppercase italic" id="modalTitle">Add New PCN</p>
                    <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-600 text-3xl font-light">&times;</button>
                </div>

                <input type="hidden" id="editId">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">PCN Number</label>
                        <input type="text" id="pcnInput" class="w-full border-2 border-slate-100 p-3 rounded-xl focus:border-indigo-400 outline-none font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Type</label>
                        <select id="pcnTypeInput" class="w-full border-2 border-slate-100 p-3 rounded-xl font-bold">
                            <option value="MANDATORY">MANDATORY</option>
                            <option value="IMMEDIATELY">IMMEDIATELY</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Status</label>
                        <select id="statusInput" class="w-full border-2 border-slate-100 p-3 rounded-xl font-black text-indigo-600">
                            <option value="IN-PROGRESS">IN-PROGRESS</option>
                            <option value="ENG REVIEW">ENG REVIEW</option>
                            <option value="OUT FOR APPROVAL">OUT FOR APPROVAL</option>
                            <option value="RELEASED">RELEASED</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Engr. Tech</label>
                        <input type="text" id="engrTechInput" class="w-full border-2 border-slate-100 p-3 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Appr. Engr</label>
                        <input type="text" id="apprEngrInput" class="w-full border-2 border-slate-100 p-3 rounded-xl">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Start Date</label>
                        <input type="date" id="startInput" class="w-full border-2 border-slate-100 p-3 rounded-xl text-xs">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Appr Date</label>
                        <input type="date" id="apprDateInput" class="w-full border-2 border-slate-100 p-3 rounded-xl text-xs">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Release Date</label>
                        <input type="date" id="releaseDateInput" class="w-full border-2 border-slate-100 p-3 rounded-xl text-xs font-bold">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">Description</label>
                        <textarea id="descInput" rows="4" class="w-full border-2 border-slate-100 p-4 rounded-xl outline-none focus:border-indigo-400 text-sm"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-rose-400 mb-2 uppercase tracking-widest">Remarks / Problems</label>
                        <textarea id="remarksInput" rows="4" class="w-full border-2 border-rose-50 bg-rose-50/20 p-4 rounded-xl outline-none focus:border-rose-400 text-sm text-rose-700 italic"></textarea>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="flex gap-6">
                        <div class="flex flex-col">
                            <label class="text-[10px] font-black text-blue-500 uppercase mb-1">Attachment</label>
                            <input type="text" id="attachInput" placeholder="Link Drive..." class="border-b-2 border-blue-200 p-2 outline-none text-sm w-64">
                        </div>
                        <div class="flex items-center gap-3 pt-4">
                            <input type="checkbox" id="reportedInput" class="w-5 h-5 accent-emerald-600">
                            <label class="text-xs font-black text-emerald-600 uppercase">Reported</label>
                        </div>
                    </div>
                    <button id="btnSubmit" onclick="saveTask()" class="bg-indigo-600 text-white font-black px-12 py-4 rounded-2xl shadow-xl hover:bg-indigo-700 uppercase tracking-widest transition-all">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMCCijp590EbD09MWJXyFv7lpiSup6IJ96OmhGUj8tSZRtYQWSjaGcybWzVLPR41k3iQ/exec";
        let allTasks = [];
        let myChart = null;
        let currentSortCol = -1;
        let sortAsc = true;

        async function loadTasks() {
            const res = await fetch(SCRIPT_URL);
            allTasks = await res.json();
            renderTable(allTasks);
            updateChart();
        }

        function toggleModal(show) {
            const modal = document.getElementById('pcnModal');
            if (show) {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                document.body.classList.add('modal-active');
            } else {
                modal.classList.add('opacity-0', 'pointer-events-none');
                document.body.classList.remove('modal-active');
                resetForm();
            }
        }

        function resetForm() {
            document.getElementById('editId').value = "";
            document.getElementById('pcnInput').value = "";
            document.getElementById('descInput').value = "";
            document.getElementById('remarksInput').value = "";
            document.getElementById('attachInput').value = "";
            document.getElementById('reportedInput').checked = false;
            document.getElementById('modalTitle').innerText = "Add New PCN";
            document.getElementById('btnSubmit').innerText = "Save Changes";
        }

        function renderTable(data) {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const body = document.getElementById('taskTableBody');
            const filtered = data.filter(t => t[1].toLowerCase().includes(query) || t[4].toLowerCase().includes(query));

            body.innerHTML = filtered.map((row) => `
                <tr class="border-b hover:bg-indigo-50/40 transition-all ${row[11] ? 'bg-slate-50 opacity-60' : ''}">
                    <td class="p-5 font-black text-slate-900">${row[1]}</td>
                    <td class="p-5"><span class="text-[10px] px-2 py-1 bg-slate-200 rounded font-bold uppercase tracking-tighter">${row[2]}</span></td>
                    <td class="p-5 text-center"><span class="px-3 py-1.5 rounded-lg font-black text-[10px] ${getStatusClass(row[3])}">${row[3]}</span></td>
                    <td class="p-5 whitespace-pre-wrap leading-relaxed italic text-slate-600">${row[4]}</td>
                    <td class="p-5 whitespace-pre-wrap text-rose-600 font-bold text-xs bg-rose-50/30">${row[12] || '-'}</td>
                    <td class="p-5 text-center text-slate-400 font-bold">${formatDate(row[5])}</td>
                    <td class="p-5 font-bold text-indigo-700">${row[6]}</td>
                    <td class="p-5 text-center text-slate-400 font-bold">${formatDate(row[7])}</td>
                    <td class="p-5 font-bold text-slate-800">${row[8]}</td>
                    <td class="p-5 text-center text-slate-900 font-black">${formatDate(row[9])}</td>
                    <td class="p-5 text-center">
                        ${row[10] ? `<a href="${row[10]}" target="_blank" class="text-blue-500 font-black underline">VIEW</a>` : '-'}
                    </td>
                    <td class="p-5 text-center text-xl">${row[11] ? '✅' : '❌'}</td>
                    <td class="p-5 text-center">
                        <button onclick="prepareEdit('${row[0]}')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold hover:scale-105 transition-all shadow-md">EDIT</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(s) {
            if (s === 'RELEASED') return 'bg-emerald-500 text-white shadow-lg shadow-emerald-200';
            if (s === 'OUT FOR APPROVAL') return 'bg-violet-600 text-white shadow-lg shadow-violet-200';
            if (s === 'ENG REVIEW') return 'bg-blue-500 text-white shadow-lg shadow-blue-200';
            return 'bg-amber-400 text-white shadow-lg shadow-amber-200';
        }

        function formatDate(d) { return d ? d.split('T')[0] : '-'; }

        function updateChart() {
            const stats = { 'RELEASED': 0, 'IN-PROGRESS': 0, 'OUT FOR APPROVAL': 0, 'ENG REVIEW': 0 };
            allTasks.forEach(t => { if(stats[t[3]] !== undefined) stats[t[3]]++; });
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('statusChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar', // Đổi sang bar cho chuyên nghiệp hơn
                data: {
                    labels: Object.keys(stats),
                    datasets: [{
                        label: 'PCN STATUS COUNT',
                        data: Object.values(stats),
                        backgroundColor: ['#10b981', '#f59e0b', '#7c3aed', '#3b82f6'],
                        borderRadius: 12
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function sortTable(colIndex) {
            sortAsc = (currentSortCol === colIndex) ? !sortAsc : true;
            currentSortCol = colIndex;
            allTasks.sort((a, b) => {
                let valA = a[colIndex] ? a[colIndex].toString().toLowerCase() : "";
                let valB = b[colIndex] ? b[colIndex].toString().toLowerCase() : "";
                return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });
            renderTable(allTasks);
        }

        async function saveTask() {
            const data = {
                id: document.getElementById('editId').value || null,
                pcn: document.getElementById('pcnInput').value,
                pcnType: document.getElementById('pcnTypeInput').value,
                status: document.getElementById('statusInput').value,
                desc: document.getElementById('descInput').value,
                start: document.getElementById('startInput').value,
                engrTech: document.getElementById('engrTechInput').value,
                apprDate: document.getElementById('apprDateInput').value,
                apprEngr: document.getElementById('apprEngrInput').value,
                releaseDate: document.getElementById('releaseDateInput').value,
                attach: document.getElementById('attachInput').value,
                isReported: document.getElementById('reportedInput').checked,
                remarks: document.getElementById('remarksInput').value
            };
            if (!data.pcn) return alert("Bồ chưa nhập PCN #!");
            
            toggleModal(false); // Đóng modal ngay cho mượt
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
            loadTasks();
        }

        function prepareEdit(id) {
            const t = allTasks.find(x => x[0] == id);
            document.getElementById('editId').value = t[0];
            document.getElementById('pcnInput').value = t[1];
            document.getElementById('pcnTypeInput').value = t[2];
            document.getElementById('statusInput').value = t[3];
            document.getElementById('descInput').value = t[4];
            document.getElementById('startInput').value = formatDate(t[5]);
            document.getElementById('engrTechInput').value = t[6];
            document.getElementById('apprDateInput').value = formatDate(t[7]);
            document.getElementById('apprEngrInput').value = t[8];
            document.getElementById('releaseDateInput').value = formatDate(t[9]);
            document.getElementById('attachInput').value = t[10];
            document.getElementById('reportedInput').checked = t[11];
            document.getElementById('remarksInput').value = t[12];
            
            document.getElementById('modalTitle').innerText = "Update PCN Entry";
            document.getElementById('btnSubmit').innerText = "Update PCN";
            toggleModal(true);
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a3');
            const toExport = allTasks.filter(t => !t[11]);
            
            // Logic gộp Remark xuống dưới Description
            const tableData = toExport.map(t => [
                t[1], 
                t[2], 
                t[3], 
                t[4] + (t[12] ? "\n---\nREMARK: " + t[12] : ""), // Gộp ở đây
                formatDate(t[5]), 
                t[6], 
                formatDate(t[7]), 
                t[8], 
                formatDate(t[9])
            ]);

            doc.setFontSize(22);
            doc.text("MASTER PCN REPORT (UNREPORTED ONLY)", 14, 20);
            
            doc.autoTable({
                head: [['PCN #', 'TYPE', 'STATUS', 'DESCRIPTION & REMARKS', 'START', 'TECH', 'APPR DATE', 'APPR ENGR', 'REL DATE']],
                body: tableData,
                startY: 30,
                theme: 'grid',
                styles: { fontSize: 9, cellPadding: 4 },
                headStyles: { fillColor: [15, 23, 42] },
                columnStyles: { 3: { cellWidth: 120 } } // Dành chỗ cho phần Description gộp Remark
            });
            doc.save("PCN-Final-Report.pdf");
        }

        loadTasks();
    </script>
</body>
</html>
